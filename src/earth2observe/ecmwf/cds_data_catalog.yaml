  projections-cordex-domains-single-levels:
    # CORDEX regional climate projections. Each request identifies
    # a (gcm_model × rcm_model × domain × experiment) tuple — only
    # certain combinations were actually run; consult the CORDEX
    # validity matrix at https://cordex.org if a request 400s.
    # Default extras below pick the EURO-CORDEX EC-Earth/RACMO22E
    # historical run on the 0.11° grid; override per-request to
    # access other scenarios. Variables use CMIP-standard CMOR short
    # names (tas, pr, hurs, …). Keys are suffixed with ``-cordex`` to
    # avoid colliding with the same-named ERA5 single-levels rows.
    # 16 of 25 catalogued variables are included here — the missing 9
    # (10m u/v wind, surface pressure, total runoff, 200hPa upper-air,
    # land-area fraction, orography) are not present in the default
    # ec_earth/racmo combination; add them in a follow-up if a
    # downstream user needs them.
    extras:
      domain: europe
      experiment: historical
      ensemble_member: r1i1p1
      gcm_model: ichec_ec_earth
      rcm_model: knmi_racmo22e
      horizontal_resolution: "0_11_degree_x_0_11_degree"
      temporal_resolution: monthly_mean
      start_year: "2001"
      end_year: "2005"
