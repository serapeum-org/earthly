        nc_variable: pr
        types: flux
        units: "kg m-2 s-1"

      "maximum-2m-temperature-in-the-last-24-hours-cmip5m":
        cds_variable: maximum_2m_temperature_in_the_last_24_hours
        nc_variable: tasmax
