# CDS data catalog for the ECMWF backend.
#
# Schema:
#
#   available_datasets:                Informational. List of every
#                                      CDS dataset short name. Read
#                                      by humans, ignored by the
#                                      runtime.
#
#   datasets.<cds_dataset>:            One entry per CDS dataset
#                                      that has curated variables.
#     monthly:                         CDS dataset short name to use
#                                      when temporal_resolution ==
#                                      "monthly". Inherited by every
#                                      variable under this dataset.
#     pressure_level:                  Optional. Default list of
#                                      pressure levels (as strings,
#                                      e.g. ["1000"]) for pressure-
#                                      level datasets. Propagated to
#                                      each variable's
#                                      cds_pressure_level at load
#                                      time; per-variable rows may
#                                      override.
#     variables.<short_code>:          One entry per variable. The
#                                      <short_code> is the slugified
#                                      cds_variable (underscores
#                                      replaced with hyphens), e.g.
#                                      key "2m-temperature" implies
#                                      cds_variable "2m_temperature".
#       cds_variable:                  Optional override of the slug-
#                                      derived default. Set this only
#                                      when the request name cannot
#                                      be obtained by replacing the
#                                      key's hyphens with underscores.
#       cds_pressure_level:            Optional override of the
#                                      parent dataset's
#                                      pressure_level for this row.
#       nc_variable:                   Required. Short variable name
#                                      inside the returned NetCDF
#                                      (e.g. "t2m" for 2m_temperature).
#       types:                         Optional. "flux" or "state".
#                                      Flux variables are accumulated
#                                      per timestep on CDS, so monthly
#                                      aggregation multiplies by the
#                                      number of days in the slice.
#       units:                         Required. Raw ERA5 unit string
#                                      emitted by CDS (used in the
#                                      output filename).
#
# Refreshed from the CDS STAC catalogue on 2026-04-26 (134 datasets
# in `available_datasets`).
#
# See: https://cds.climate.copernicus.eu/datasets

