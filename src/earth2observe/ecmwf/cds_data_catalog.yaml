  projections-cmip5-monthly-single-levels:
    # CMIP5 monthly atmospheric / surface variables. Each request
    # selects a (model × experiment × ensemble_member × period)
    # tuple — the CMIP5 ESGF archive is sparse, so the same model
    # may not have every variable for every ensemble. Defaults below
    # pick the EC-Earth historical r12i1p1 1950-2012 run that
    # carries most surface vars; override per-request to pick a
    # different scenario or model. CMIP5 returns CMOR-named
    # NetCDFs (tas, pr, psl, …) inside a zip; the package already
    # passes those through unchanged. Keys carry the ``-cmip5m``
    # suffix to avoid colliding with same-named ERA5 single-levels
