        units: m
        extras:
          vertical_resolution: single_level

      "meridional-velocity":
        nc_variable: vomecrty
        units: "m/s"
        extras:
          vertical_resolution: all_levels

      "meridional-wind-stress":
        nc_variable: sometauy
