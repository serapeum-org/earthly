  derived-drought-historical-monthly:
    # Standardised Precipitation/Evapotranspiration Index (SPEI/SPI)
    # historical monthly. 1 of 5 catalogued vars probe-confirmed
    # (SPEI1 ensemble member). dataset_type / accumulation_period /
    # version drive the cds_variable shape.
    extras:
      product_type: [ensemble_members]
      accumulation_period: ["1"]
      dataset_type: consolidated_dataset
      version: "1_0"
    variables:

      "spei1-drought":
        cds_variable: standardised_precipitation_evapotranspiration_index
        nc_variable: SPEI1
        types: state
        units: "1"

      "spi3-drought":
        cds_variable: standardised_precipitation_index
        nc_variable: SPI3
        types: state
        units: "1"

      "prob-zero-precipitation-spi-drought":
        cds_variable: probability_of_zero_precipitation_spi
        nc_variable: pzero
        types: state
        units: "1"

      "test-normality-spei-drought":
        cds_variable: test_for_normality_spei
        nc_variable: significance
        types: state
        units: "1"

      "test-normality-spi-drought":
        cds_variable: test_for_normality_spi
        nc_variable: significance
        types: state
        units: "1"

  derived-gridded-glacier-mass-change:
    # Gridded annual glacier mass change (WGMS FoG). 1 of 1 catalogued
    # var probe-confirmed (glacier_mass_change). Unit is Gt (Gigatonnes).
    extras:
      product_version: wgms_fog_2022_09
      hydrological_year: ["1975_76"]
    variables:

      "glacier-mass-change-glaciers":
        cds_variable: glacier_mass_change
        nc_variable: glacier_mass_change
        types: state
        units: "Gt"

  seasonal-original-single-levels:
    # ECMWF seasonal forecast original (un-aggregated) single-levels.
    # Sibling of seasonal-monthly-single-levels but without the
    # monthly aggregation step. 1 var probe-confirmed (2m_temperature).
    extras:
      originating_centre: ecmwf
      system: "5"
      leadtime_hour: ["24"]
    variables:

      "2m-temperature-seasonal-orig":
        cds_variable: 2m_temperature
        nc_variable: t2m
        types: state
        units: K

  seasonal-postprocessed-single-levels:
    # ECMWF seasonal forecast post-processed (anomalies / probabilities)
    # single-levels. 1 var probe-confirmed
    # (2m_dewpoint_temperature_anomaly -> d2a). Anomaly products reference
    # a climate-base period and report deviations rather than raw values.
    extras:
      product_type: [ensemble_mean]
      originating_centre: ukmo
      system: "12"
      leadtime_month: ["1"]
    variables:

      "2m-dewpoint-temperature-anomaly-seasonal-pp":
        cds_variable: 2m_dewpoint_temperature_anomaly
        nc_variable: d2a
        types: state
        units: K

  seasonal-monthly-pressure-levels:
    # ECMWF seasonal forecast monthly aggregates on pressure levels.
    # 1 var probe-confirmed (geopotential -> z at 10 hPa).
    pressure_level: ["10"]
    extras:
      product_type: [ensemble_mean]
      originating_centre: ukmo
      system: "601"
      leadtime_month: ["1"]
    variables:

      "geopotential-seasonal-p":
        cds_variable: geopotential
        nc_variable: z
        types: state
        units: "m**2 s**-2"

  seasonal-original-pressure-levels:
