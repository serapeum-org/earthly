      "minimum-2m-temperature-in-the-last-24-hours-cmip5m":
        cds_variable: minimum_2m_temperature_in_the_last_24_hours
        nc_variable: tasmin
        types: state
        units: K

      "mean-sea-level-pressure-cmip5m":
        cds_variable: mean_sea_level_pressure
        nc_variable: psl
        types: state
        units: Pa

      "surface-solar-radiation-downwards-cmip5m":
        cds_variable: surface_solar_radiation_downwards
