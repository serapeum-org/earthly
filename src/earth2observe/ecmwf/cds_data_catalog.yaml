  reanalysis-oras5:
    # Monthly-only ocean reanalysis from ECMWF (NEMO 3.4.1, ORCA025
    # grid). ``product_type`` selects the temporal coverage:
    # ``consolidated`` covers 1958-2014 (the default); ``operational``
    # covers 2015 onwards. ``vertical_resolution`` is per-variable —
    # 21 of the 27 fields are 2-D (``single_level``) and 6 are 3-D
    # (``all_levels``); each variable row pins its own value via the
    # row-level ``extras`` map. ORAS5 returns NEMO-style nc_variables
    # (``vomecrty`` etc.) rather than ECMWF GRIB short names. The
    # ``oceanic_monthly`` request_kind tells ECMWF.api() to drop the
    # ERA5 template defaults that ORAS5 rejects (``day``, ``time``,
    # ``area``, ``product_type``).
    request_kind: oceanic_monthly
    extras:
      product_type: [consolidated]
    variables:

      "depth-of-14-c-isotherm":
        nc_variable: so14chgt
        units: m
        extras:
          vertical_resolution: single_level

      "depth-of-17-c-isotherm":
        nc_variable: so17chgt
        units: m
        extras:
          vertical_resolution: single_level

      "depth-of-20-c-isotherm":
        nc_variable: so20chgt
        units: m
        extras:
          vertical_resolution: single_level

      "depth-of-26-c-isotherm":
        nc_variable: so26chgt
        units: m
        extras:
          vertical_resolution: single_level

      "depth-of-28-c-isotherm":
