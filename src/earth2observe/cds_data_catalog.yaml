# CDS data catalog for the ECMWF backend.
#
# Schema:
#
#   variables.<short_code>:
#     cds_dataset:          Required. CDS dataset short name used for daily
#                           and sub-daily requests, e.g.
#                           "reanalysis-era5-single-levels".
#     cds_dataset_monthly:  Optional. CDS dataset short name used when
#                           temporal_resolution == "monthly". When absent,
#                           the daily dataset is reused.
#     cds_variable:         Required. CDS variable name passed in the
#                           retrieve() request, e.g. "2m_temperature".
#     cds_pressure_level:   Optional. List of pressure levels (strings) for
#                           pressure-level datasets, e.g. ["1000"].
#     nc_variable:          Required for post_download. Short variable name
#                           used inside the NetCDF that CDS returns
#                           (e.g. "t2m" for 2m_temperature, "tp" for
#                           total_precipitation). Differs from cds_variable.
#     types:                Optional. "flux" or "state". Flux variables are
#                           accumulated per timestep on CDS, so post_download
#                           multiplies by the number of days in the slice
#                           when aggregating monthly. State variables are
#                           instantaneous and need no scaling.
#     units:                Output unit after factors_add / factors_mul are
#                           applied (used by post_download for file naming).
#     file_name:            Stem used for the output NetCDF / GeoTIFF
#                           filenames.
#     factors_add:          Additive offset applied during post-processing.
#     factors_mul:          Multiplicative scale applied during
#                           post-processing.
#
# datasets: An informational index of the CDS datasets referenced below.
#           Used for documentation; the runtime resolves datasets via the
#           per-variable cds_dataset / cds_dataset_monthly keys.
#
# See: https://cds.climate.copernicus.eu/datasets?q=era5

version: 2

datasets:
  - reanalysis-era5-single-levels
  - reanalysis-era5-single-levels-monthly-means
  - reanalysis-era5-pressure-levels
  - reanalysis-era5-pressure-levels-monthly-means
  - reanalysis-era5-land
  - reanalysis-era5-land-monthly-means

variables:

  # ----- single-level variables -----

  "2T":
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: 2m_temperature
    nc_variable: t2m
    types: state
    units: C
    file_name: Tair
    factors_add: -273.15
    factors_mul: 1

  "2D":
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: 2m_dewpoint_temperature
    nc_variable: d2m
    types: state
    units: C
    file_name: Dewpoint2m
    factors_add: -273.15
    factors_mul: 1

  SP:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: surface_pressure
    nc_variable: sp
    types: state
    units: kPa
    file_name: Psurf
    factors_add: 0
    factors_mul: 0.001

  TP:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: total_precipitation
    nc_variable: tp
    types: flux
    units: mm
    file_name: P
    factors_add: 0
    factors_mul: 1000

  E:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: evaporation
    nc_variable: e
    types: flux
    units: mm
    file_name: Evaporation
    factors_add: 0
    factors_mul: 1000

  RO:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: runoff
    nc_variable: ro
    types: flux
    units: mm
    file_name: Runoff
    factors_add: 0
    factors_mul: 1000

  SRO:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: surface_runoff
    nc_variable: sro
    types: flux
    units: mm
    file_name: Surf_Runoff
    factors_add: 0
    factors_mul: 1000

  SSRO:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: sub_surface_runoff
    nc_variable: ssro
    types: flux
    units: mm
    file_name: Subsurf_Runoff
    factors_add: 0
    factors_mul: 1000

  "10U":
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: 10m_u_component_of_wind
    nc_variable: u10
    types: state
    units: m_s-1
    file_name: Wind_U
    factors_add: 0
    factors_mul: 1

  "10V":
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: 10m_v_component_of_wind
    nc_variable: v10
    types: state
    units: m_s-1
    file_name: Wind_V
    factors_add: 0
    factors_mul: 1

  "10SI":
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: 10m_wind_speed
    nc_variable: si10
    types: state
    units: m_s-1
    file_name: Wind10m
    factors_add: 0
    factors_mul: 1

  AL:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: forecast_albedo
    nc_variable: fal
    types: state
    units: unitless
    file_name: Albedo
    factors_add: 0
    factors_mul: 1

  HCC:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: high_cloud_cover
    nc_variable: hcc
    types: state
    units: unitless
    file_name: HighCloudCover
    factors_add: 0
    factors_mul: 1

  SR:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: forecast_surface_roughness
    nc_variable: fsr
    types: state
    units: m
    file_name: SurfRoughness
    factors_add: 0
    factors_mul: 1

  SSR:
    cds_dataset: reanalysis-era5-single-levels
    cds_dataset_monthly: reanalysis-era5-single-levels-monthly-means
    cds_variable: surface_net_solar_radiation
    nc_variable: ssr
    types: flux
    units: J_m-2
    file_name: SWnet
    factors_add: 0
    factors_mul: 1

  # ----- pressure-level variables -----

  T:
    cds_dataset: reanalysis-era5-pressure-levels
    cds_dataset_monthly: reanalysis-era5-pressure-levels-monthly-means
    cds_variable: temperature
    cds_pressure_level: ["1000"]
    nc_variable: t
    types: state
    units: C
    file_name: Tair2m
    factors_add: -273.15
    factors_mul: 1

  Q:
    cds_dataset: reanalysis-era5-pressure-levels
    cds_dataset_monthly: reanalysis-era5-pressure-levels-monthly-means
    cds_variable: specific_humidity
    cds_pressure_level: ["1000"]
    nc_variable: q
    types: state
    units: kg_kg-1
    file_name: Qair
    factors_add: 0
    factors_mul: 1

  R:
    cds_dataset: reanalysis-era5-pressure-levels
    cds_dataset_monthly: reanalysis-era5-pressure-levels-monthly-means
    cds_variable: relative_humidity
    cds_pressure_level: ["1000"]
    nc_variable: r
    types: state
    units: percentage
    file_name: RelQair
    factors_add: 0
    factors_mul: 1
