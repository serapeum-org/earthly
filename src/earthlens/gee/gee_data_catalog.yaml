# Google Earth Engine data catalog for the GEE backend.
#
# Schema:
#
#   available_datasets:                Informational. List of Earth
#                                      Engine asset ids the package
#                                      knows about, grouped by provider
#                                      with comments. Read by humans
#                                      and tools/gee/audit_gee_datasets.py;
#                                      ignored at runtime. Regenerated
#                                      by tools/gee/refresh_gee_catalog.py.
#
#   datasets.<asset_id>:               One entry per Earth Engine
#                                      collection/image with curated
#                                      band + aggregation metadata.
#     title:                           Required. Human title.
#     provider:                        Optional. Primary data provider.
#     ee_type:                         Required. "image" |
#                                      "image_collection" | "table".
#                                      ("table" = FeatureCollection,
#                                      out of scope for the raster
#                                      backend.)
#     cadence:                         Optional. Native temporal step,
#                                      {interval: <int>, unit:
#                                      minute|hour|day|month|year}.
#                                      Omit for static images. Note:
#                                      the STAC `gee:interval` this is
#                                      derived from is not always
#                                      accurate — hand-verify.
#     spatial_resolution:              Optional. Nominal pixel size in
#                                      metres (the dataset's coarsest
#                                      relevant `gsd`).
#     extent.start_date:               Required. First available date
#                                      (YYYY-MM-DD).
#     extent.end_date:                 Optional. Last available date,
#                                      or null for a continuously
#                                      updated collection.
#     extent.bbox:                     Optional. [W, S, E, N]; omit
#                                      for global.
#     default_reducer:                 Optional (default "median").
#                                      Earth Engine reducer used to
#                                      collapse a temporal composite:
#                                      "median" for cloud-screened
#                                      optical scenes, "mean" for
#                                      continuous fields / rates,
#                                      "mosaic" for tiled or annual
#                                      static maps.
#     terms:                           Optional. Short licence /
#                                      attribution note.
#     user_uploaded:                   Optional (default false). True
#                                      for community-uploaded assets.
#     extras:                          Optional. Passthrough kwargs for
#                                      the request builder.
#     bands.<band_id>:                 One entry per band.
#       description:                   Required. Human description.
#       units:                         Optional. Physical unit (often
#                                      null for reflectance / indices).
#       scale:                         Optional. Multiply raw DN by
#                                      this to get physical units.
#       offset:                        Optional. Add this after
#                                      scaling.
#       wavelength:                    Optional. Centre wavelength (um)
#                                      for optical bands.
#       min:                           Optional. Typical/valid minimum
#                                      DN.
#       max:                           Optional. Typical/valid maximum
#                                      DN.
#       estimated_range:               Optional (default false). True
#                                      if min/max are sample estimates
#                                      rather than hard bounds.
#
# Metadata transcribed from the Earth Engine STAC catalog
# (https://storage.googleapis.com/earthengine-stac/catalog/catalog.json)
# on 2026-05-12.
#
# See: https://developers.google.com/earth-engine/datasets

