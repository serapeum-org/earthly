# Google Earth Engine data catalog for the GEE backend.
#
# Schema:
#
#   available_datasets:                Informational. List of Earth
#                                      Engine asset ids the package
#                                      knows about, grouped by provider
#                                      with comments. Read by humans
#                                      and tools/audit_gee_datasets.py;
#                                      ignored at runtime. Regenerated
#                                      by tools/refresh_gee_catalog.py.
#
#   datasets.<asset_id>:               One entry per Earth Engine
#                                      collection/image with curated
#                                      band + aggregation metadata.
#     title:                           Required. Human title.
#     provider:                        Optional. Primary data provider.
#     ee_type:                         Required. "image" |
#                                      "image_collection" | "table".
#                                      ("table" = FeatureCollection,
#                                      out of scope for the raster
#                                      backend.)
#     cadence:                         Optional. Native temporal step,
#                                      {interval: <int>, unit:
#                                      minute|hour|day|month|year}.
#                                      Omit for static images. Note:
#                                      the STAC `gee:interval` this is
#                                      derived from is not always
#                                      accurate — hand-verify.
#     spatial_resolution:              Optional. Nominal pixel size in
#                                      metres (the dataset's coarsest
#                                      relevant `gsd`).
#     extent.start_date:               Required. First available date
#                                      (YYYY-MM-DD).
#     extent.end_date:                 Optional. Last available date,
#                                      or null for a continuously
#                                      updated collection.
#     extent.bbox:                     Optional. [W, S, E, N]; omit
#                                      for global.
#     default_reducer:                 Optional (default "median").
#                                      Earth Engine reducer used to
#                                      collapse a temporal composite:
#                                      "median" for cloud-screened
#                                      optical scenes, "mean" for
#                                      continuous fields / rates,
#                                      "mosaic" for tiled or annual
#                                      static maps.
#     terms:                           Optional. Short licence /
#                                      attribution note.
#     user_uploaded:                   Optional (default false). True
#                                      for community-uploaded assets.
#     extras:                          Optional. Passthrough kwargs for
#                                      the request builder.
#     bands.<band_id>:                 One entry per band.
#       description:                   Required. Human description.
#       units:                         Optional. Physical unit (often
#                                      null for reflectance / indices).
#       scale:                         Optional. Multiply raw DN by
#                                      this to get physical units.
#       offset:                        Optional. Add this after
#                                      scaling.
#       wavelength:                    Optional. Centre wavelength (um)
#                                      for optical bands.
#       min:                           Optional. Typical/valid minimum
#                                      DN.
#       max:                           Optional. Typical/valid maximum
#                                      DN.
#       estimated_range:               Optional (default false). True
#                                      if min/max are sample estimates
#                                      rather than hard bounds.
#
# Metadata transcribed from the Earth Engine STAC catalog
# (https://storage.googleapis.com/earthengine-stac/catalog/catalog.json)
# on 2026-05-12.
#
# See: https://developers.google.com/earth-engine/datasets

version: 1

available_datasets:
  # ----- Landsat (USGS/NASA) -----
  - LANDSAT/LC08/C02/T1_L2
  - LANDSAT/LC09/C02/T1_L2
  - LANDSAT/LE07/C02/T1_L2
  - LANDSAT/LT05/C02/T1_L2

  # ----- Sentinel (Copernicus) -----
  - COPERNICUS/S2_SR_HARMONIZED
  - COPERNICUS/S2_HARMONIZED
  - COPERNICUS/S1_GRD
  - COPERNICUS/S5P/OFFL/L3_NO2
  - COPERNICUS/S5P/OFFL/L3_CO

  # ----- MODIS (NASA LP DAAC) -----
  - MODIS/061/MOD13Q1
  - MODIS/061/MYD13Q1
  - MODIS/061/MOD11A1
  - MODIS/061/MOD11A2
  - MODIS/061/MOD09GA
  - MODIS/061/MCD12Q1
  - MODIS/061/MOD16A2
  - MODIS/061/MOD17A2H

  # ----- Climate / weather / precipitation -----
  - ECMWF/ERA5_LAND/DAILY_AGGR
  - ECMWF/ERA5_LAND/HOURLY
  - ECMWF/ERA5/DAILY
  - UCSB-CHG/CHIRPS/DAILY
  - UCSB-CHG/CHIRPS/PENTAD
  - NASA/GPM_L3/IMERG_V07
  - NASA/GPM_L3/IMERG_MONTHLY_V07
  - NASA/GLDAS/V021/NOAH/G025/T3H
  - IDAHO_EPSCOR/TERRACLIMATE

  # ----- Elevation -----
  - USGS/SRTMGL1_003
  - NASA/NASADEM_HGT/001
  - COPERNICUS/DEM/GLO30
  - MERIT/DEM/v1_0_3

  # ----- Land cover / land use -----
  - ESA/WorldCover/v100
  - ESA/WorldCover/v200
  - GOOGLE/DYNAMICWORLD/V1
  - MODIS/006/MCD12Q1
  - COPERNICUS/Landcover/100m/Proba-V-C3/Global

  # ----- Water -----
  - JRC/GSW1_4/GlobalSurfaceWater
  - JRC/GSW1_4/MonthlyHistory
  - WWF/HydroSHEDS/15ACC

datasets:

  USGS/SRTMGL1_003:
    title: NASA SRTM Digital Elevation 30m
    provider: NASA/USGS/JPL-Caltech
    ee_type: image
    spatial_resolution: 30
    extent:
      start_date: "2000-02-11"
      end_date: "2000-02-22"
    default_reducer: mosaic
    terms: Public domain (NASA/JPL).
    bands:
      elevation:
        description: Elevation above sea level
        units: m
        min: -10
        max: 6500
        estimated_range: true

  ESA/WorldCover/v200:
    title: ESA WorldCover 10m v200 (2021)
    provider: ESA WorldCover Consortium
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 10
    extent:
      start_date: "2021-01-01"
      end_date: "2022-01-01"
    default_reducer: mosaic
    terms: CC-BY-4.0.
    user_uploaded: true
    bands:
      Map:
        description: Land-cover class (ESA WorldCover legend)
        min: 10
        max: 100

  UCSB-CHG/CHIRPS/DAILY:
    title: "CHIRPS Daily: Climate Hazards Center InfraRed Precipitation with Station data"
    provider: UCSB / CHG
    ee_type: image_collection
    cadence: { interval: 1, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1981-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: mean
    terms: Public domain.
    bands:
      precipitation:
        description: Daily precipitation
        units: mm/d
        min: 0
        max: 1444.34
        estimated_range: true

  NASA/GPM_L3/IMERG_V07:
    title: "GPM IMERG v07: Global Precipitation Measurement (half-hourly)"
    provider: NASA GES DISC
    ee_type: image_collection
    cadence: { interval: 30, unit: minute }
    spatial_resolution: 11132
    extent:
      start_date: "1998-01-01"
      end_date: null
    default_reducer: mean
    terms: NASA — freely available, no restrictions.
    bands:
      precipitation:
        description: Snapshot precipitation, calibrated
        units: mm/hr
        min: 0
        max: 120
        estimated_range: true
      precipitationUncal:
        description: Snapshot precipitation, uncalibrated
