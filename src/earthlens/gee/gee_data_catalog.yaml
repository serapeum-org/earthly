      probabilityLiquidPrecipitation:
        description: Probability of liquid precipitation phase
        units: "%"
        min: 0
        max: 100
      randomError:
        description: Random error estimate for snapshot precipitation
        units: mm/hr

  ECMWF/ERA5_LAND/DAILY_AGGR:
    title: ERA5-Land Daily Aggregated — ECMWF Climate Reanalysis
    provider: ECMWF / Copernicus Climate Change Service (C3S)
    ee_type: image_collection
    # STAC reports {interval: 1, unit: month} for this collection but it is a
    # *daily* product — hand-corrected here.
    cadence: { interval: 1, unit: day }
    spatial_resolution: 11132
    extent:
      start_date: "1950-01-02"
      end_date: null
    default_reducer: mean
    terms: Copernicus C3S/CAMS licence — acknowledge ERA5-Land.
    bands:
      temperature_2m:
        description: 2 m air temperature
        units: K
      dewpoint_temperature_2m:
        description: 2 m dewpoint temperature
        units: K
      skin_temperature:
        description: Skin (surface) temperature
        units: K
      soil_temperature_level_1:
        description: Soil temperature, layer 1 (0-7 cm)
        units: K
      surface_pressure:
        description: Surface pressure
        units: Pa
      total_precipitation_sum:
        description: Total precipitation, daily sum
        units: m
      surface_solar_radiation_downwards_sum:
        description: Surface downward solar radiation, daily sum
        units: J/m^2
      u_component_of_wind_10m:
        description: 10 m eastward wind component
        units: m/s
      v_component_of_wind_10m:
        description: 10 m northward wind component
