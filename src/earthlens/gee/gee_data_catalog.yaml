datasets:

  USGS/SRTMGL1_003:
    title: NASA SRTM Digital Elevation 30m
    provider: NASA/USGS/JPL-Caltech
    ee_type: image
    spatial_resolution: 30
    extent:
      start_date: "2000-02-11"
      end_date: "2000-02-22"
    default_reducer: mosaic
    terms: Public domain (NASA/JPL).
    bands:
      elevation:
        description: Elevation above sea level
        units: m
        min: -10
        max: 6500
        estimated_range: true

  ESA/WorldCover/v200:
    title: ESA WorldCover 10m v200 (2021)
    provider: ESA WorldCover Consortium
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 10
    extent:
      start_date: "2021-01-01"
      end_date: "2022-01-01"
    default_reducer: mosaic
    terms: CC-BY-4.0.
    user_uploaded: true
    bands:
      Map:
        description: Land-cover class (ESA WorldCover legend)
        min: 10
        max: 100

  UCSB-CHG/CHIRPS/DAILY:
    title: "CHIRPS Daily: Climate Hazards Center InfraRed Precipitation with Station data"
    provider: UCSB / CHG
    ee_type: image_collection
    cadence: { interval: 1, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1981-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: mean
    terms: Public domain.
    bands:
      precipitation:
        description: Daily precipitation
        units: mm/d
        min: 0
        max: 1444.34
        estimated_range: true

  NASA/GPM_L3/IMERG_V07:
    title: "GPM IMERG v07: Global Precipitation Measurement (half-hourly)"
    provider: NASA GES DISC
    ee_type: image_collection
    cadence: { interval: 30, unit: minute }
    spatial_resolution: 11132
    extent:
      start_date: "1998-01-01"
      end_date: null
    default_reducer: mean
    terms: NASA — freely available, no restrictions.
    bands:
      precipitation:
        description: Snapshot precipitation, calibrated
        units: mm/hr
        min: 0
        max: 120
        estimated_range: true
      precipitationUncal:
        description: Snapshot precipitation, uncalibrated
        units: mm/hr
      probabilityLiquidPrecipitation:
        description: Probability of liquid precipitation phase
        units: "%"
        min: 0
        max: 100
      randomError:
        description: Random error estimate for snapshot precipitation
        units: mm/hr

  ECMWF/ERA5_LAND/DAILY_AGGR:
    title: ERA5-Land Daily Aggregated — ECMWF Climate Reanalysis
    provider: ECMWF / Copernicus Climate Change Service (C3S)
    ee_type: image_collection
    # STAC reports {interval: 1, unit: month} for this collection but it is a
    # *daily* product — hand-corrected here.
    cadence: { interval: 1, unit: day }
    spatial_resolution: 11132
    extent:
      start_date: "1950-01-02"
      end_date: null
    default_reducer: mean
    terms: Copernicus C3S/CAMS licence — acknowledge ERA5-Land.
    bands:
      temperature_2m:
        description: 2 m air temperature
        units: K
      dewpoint_temperature_2m:
        description: 2 m dewpoint temperature
        units: K
      skin_temperature:
        description: Skin (surface) temperature
        units: K
      soil_temperature_level_1:
        description: Soil temperature, layer 1 (0-7 cm)
        units: K
      surface_pressure:
        description: Surface pressure
        units: Pa
      total_precipitation_sum:
        description: Total precipitation, daily sum
        units: m
      surface_solar_radiation_downwards_sum:
        description: Surface downward solar radiation, daily sum
        units: J/m^2
      u_component_of_wind_10m:
        description: 10 m eastward wind component
        units: m/s
      v_component_of_wind_10m:
        description: 10 m northward wind component
        units: m/s

  MODIS/061/MOD13Q1:
    title: MOD13Q1.061 Terra Vegetation Indices 16-Day Global 250m
    provider: NASA LP DAAC
    ee_type: image_collection
    cadence: { interval: 16, unit: day }
    spatial_resolution: 250
    extent:
      start_date: "2000-02-18"
      end_date: null
    default_reducer: mean
    terms: NASA LP DAAC — no restrictions.
    bands:
      NDVI:
        description: Normalized Difference Vegetation Index
        scale: 0.0001
        min: -2000
        max: 10000
      EVI:
        description: Enhanced Vegetation Index
        scale: 0.0001
        min: -2000
        max: 10000
      sur_refl_b01:
        description: Red surface reflectance
        scale: 0.0001
        wavelength: 0.645
      sur_refl_b02:
        description: NIR surface reflectance
        scale: 0.0001
        wavelength: 0.858
      SummaryQA:
        description: VI quality summary
      DayOfYear:
        description: Day of year of the composite pixel

  MODIS/061/MOD11A1:
