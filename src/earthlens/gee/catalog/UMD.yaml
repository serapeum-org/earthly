# Auto-grouped slice of the GEE catalog: UMD.
# 15 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  UMD/GLAD/PRIMARY_HUMID_TROPICAL_FORESTS/v1:
    title: "UMD GLAD: Primary Humid Tropical Forests (30m, 2001 baseline)"
    provider: UMD GLAD
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 30
    extent:
      start_date: "2001-01-01"
      end_date: "2001-12-31"
    default_reducer: mosaic
    license: proprietary
    terms_note: 'Free for any use (UMD/GLAD).'
    user_uploaded: true
    bands:
      Primary_HT_forests:
        description: Binary mask of primary humid tropical forest extent

  UMD/hansen/global_forest_change_2013:
