# Auto-grouped slice of the GEE catalog: ESA.
# 8 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  ESA/CCI/Above_Ground_Biomass/V6_0:
    title: "ESA CCI Above-Ground Biomass v6.0 (100m, 2007/2010/2015-2022)"
    provider: ESA Biomass CCI
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 100
    extent:
      start_date: "2007-01-01"
      end_date: null
    default_reducer: mosaic
    license: proprietary
    terms_note: 'Free for use under ESA CCI data terms.'
    bands:
      agb:
        description: Above-ground biomass density
        units: Mg/ha
      agb_sd:
        description: Per-pixel uncertainty (standard deviation) of AGB
        units: Mg/ha

  ESA/CCI/FireCCI/5_1:
    title: "FireCCI v5.1: ESA CCI Burned Area Pixel Product (250m, MODIS-based)"
    provider: ESA Climate Change Initiative — Fire ECV
    ee_type: image_collection
    cadence: { interval: 1, unit: month }
    spatial_resolution: 250
    extent:
      start_date: "2001-01-01"
      end_date: "2020-12-31"
    default_reducer: mosaic
    license: proprietary
    terms_note: 'Free for any use with attribution.'
    user_uploaded: true
    bands:
      BurnDate:
        description: Day of year of first burn detection
        min: 1
        max: 366
      ConfidenceLevel:
        description: Probability of burn detection
        units: "%"
        min: 1
        max: 100
      LandCover:
        description: Land-cover class of the burned pixel (CCI LandCover)
      ObservedFlag:
        description: Why the pixel was/was-not processed

  ESA/GLOBCOVER_L4_200901_200912_V2_3:
    title: 'GlobCover: Global Land Cover Map'
    provider: ESA
    ee_type: image
    spatial_resolution: 300
    extent:
      start_date: "2009-01-01"
      end_date: null
    default_reducer: mosaic
    license: proprietary
    terms_note: 'The GlobCover products have been processed by ESA and by the Université'
    bands:
      landcover:
        description: The land cover map is derived by an automatic and
      qa:
        description: Binary quality band indicating whether the reference dataset has been used instead

  ESA/WorldCereal/2021/MARKERS/v100:
    title: "ESA WorldCereal 2021 MARKERS v100: Active Cropland Markers (10m)"
    provider: ESA WorldCereal Consortium
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 10
    extent:
      start_date: "2020-01-01"
      end_date: "2021-12-31"
    default_reducer: mosaic
    license: CC-BY-4.0
    user_uploaded: true
    bands:
      classification:
        description: Active-cropland marker (0=absent, 100=present)
        min: 0
        max: 100

  ESA/WorldCereal/2021/MODELS/v100:
    title: "ESA WorldCereal 2021 v100: Global Cropland and Crop-Type Maps (10m)"
    provider: ESA WorldCereal Consortium
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 10
    extent:
      start_date: "2020-01-01"
      end_date: "2021-12-31"
    default_reducer: mosaic
    license: CC-BY-4.0
    user_uploaded: true
    bands:
      classification:
        description: Cropland / crop-type classification (0 = absent, 100 = present)
        min: 0
        max: 100
      confidence:
        description: Per-pixel classifier confidence
        min: 0
        max: 100

  ESA/WorldCereal/AEZ/v100:
    title: ESA WorldCereal AEZ v100
    provider: ESA WorldCereal Consortium
    ee_type: table
    extent:
      start_date: "2020-01-01"
