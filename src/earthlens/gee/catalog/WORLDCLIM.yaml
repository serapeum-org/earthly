# Auto-grouped slice of the GEE catalog: WORLDCLIM.
# 2 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  WORLDCLIM/V1/BIO:
    title: "WorldClim BIO v1: 19 Bioclimatic Variables (1km, 1960-1990 climatology)"
    provider: WorldClim — University of California, Berkeley
    ee_type: image
    spatial_resolution: 927.67
    extent:
      start_date: "1960-01-01"
      end_date: "1990-12-31"
    default_reducer: mosaic
    license: CC-BY-SA-4.0
    bands:
      bio01:
        description: Annual mean temperature
        units: deg_C
        scale: 0.1
      bio02:
        description: Mean diurnal range (mean of monthly Tmax-Tmin)
        units: deg_C
        scale: 0.1
      bio03:
        description: Isothermality (BIO2 / BIO7) * 100
        scale: 0.01
      bio04:
        description: Temperature seasonality (standard deviation * 100)
        units: deg_C
        scale: 0.01
      bio05:
        description: Maximum temperature of warmest month
        units: deg_C
        scale: 0.1
      bio06:
        description: Minimum temperature of coldest month
        units: deg_C
        scale: 0.1
      bio07:
        description: Temperature annual range (BIO5-BIO6)
        units: deg_C
        scale: 0.1
      bio08:
        description: Mean temperature of wettest quarter
        units: deg_C
        scale: 0.1
      bio09:
        description: Mean temperature of driest quarter
        units: deg_C
        scale: 0.1
      bio10:
        description: Mean temperature of warmest quarter
        units: deg_C
        scale: 0.1
      bio11:
        description: Mean temperature of coldest quarter
        units: deg_C
        scale: 0.1
      bio12:
        description: Annual precipitation
        units: mm
      bio13:
        description: Precipitation of wettest month
        units: mm
      bio14:
        description: Precipitation of driest month
        units: mm
      bio15:
        description: Precipitation seasonality (CV)
      bio16:
        description: Precipitation of wettest quarter
        units: mm
      bio17:
        description: Precipitation of driest quarter
        units: mm
      bio18:
        description: Precipitation of warmest quarter
        units: mm
      bio19:
        description: Precipitation of coldest quarter
        units: mm

  WORLDCLIM/V1/MONTHLY:
    title: "WorldClim v1: Global Climate Normals (1960-1990, monthly 1km)"
    provider: WorldClim — University of California, Berkeley
    ee_type: image_collection
    cadence: { interval: 1, unit: month }
    spatial_resolution: 927.67
    extent:
      start_date: "1960-01-01"
      end_date: "1990-12-31"
    default_reducer: mean
    license: CC-BY-SA-4.0
    bands:
      tavg:
        description: Mean monthly temperature climatology
        units: deg_C
        scale: 0.1
      tmin:
        description: Minimum monthly temperature climatology
        units: deg_C
        scale: 0.1
      tmax:
        description: Maximum monthly temperature climatology
        units: deg_C
        scale: 0.1
      prec:
        description: Mean monthly precipitation climatology
        units: mm

