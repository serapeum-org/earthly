# Auto-grouped slice of the GEE catalog: OSU.
# 4 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  OSU/GIMP/2000_ICE_OCEAN_MASK:
    title: "GIMP Greenland Ice + Ocean Mask 2000 (15m, OSU Greenland Mapping Project)"
    provider: NASA NSIDC DAAC
    ee_type: image
    spatial_resolution: 15
    extent:
      start_date: "1999-06-30"
      end_date: "2002-12-31"
      bbox: [-89.32, 58.80, 7.56, 83.95]
    default_reducer: mosaic
    license: proprietary
    terms_note: 'Free with citation (OSU Greenland Mapping Project).'
    bands:
      ocean_mask:
        description: Ocean mask (binary)
      ice_mask:
        description: Ice mask (binary)

  OSU/GIMP/2000_IMAGERY_MOSAIC:
