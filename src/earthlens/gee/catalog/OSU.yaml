      B1:
        description: Landsat-7 ETM+ blue
      B2:
        description: Landsat-7 ETM+ green
      B3:
        description: Landsat-7 ETM+ red
      B4:
        description: Landsat-7 ETM+ NIR
      B5:
        description: Landsat-7 ETM+ SWIR-1

  OSU/GIMP/DEM:
