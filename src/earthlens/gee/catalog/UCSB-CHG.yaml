# Auto-grouped slice of the GEE catalog: UCSB-CHG.
# 3 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  UCSB-CHG/CHIRPS/DAILY:
    title: "CHIRPS Daily: Climate Hazards Center InfraRed Precipitation with Station data"
    provider: UCSB / CHG
    ee_type: image_collection
    cadence: { interval: 1, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1981-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: mean
    license: public-domain
    bands:
      precipitation:
        description: Daily precipitation
        units: mm/d
        min: 0
        max: 1444.34
        estimated_range: true

  UCSB-CHG/CHIRPS/PENTAD:
    title: "CHIRPS Pentad: 5-day rainfall (UCSB Climate Hazards Center)"
    provider: UCSB / CHG
    ee_type: image_collection
    # Pentads are nominal 5-day windows (the last pentad of a month can be 3-6 days);
    # 5/day is the most accurate cadence the catalog can express.
    cadence: { interval: 5, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1981-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: sum
    license: public-domain
    bands:
      precipitation:
        description: Pentad precipitation total
        units: mm/pentad
        min: 0
        max: 1072.43
        estimated_range: true

  UCSB-CHG/CHIRTS/DAILY:
    title: "CHIRTS Daily Temperature: UCSB CHC InfraRed Temperature with Stations (5km, 1983-)"
    provider: UCSB / CHG
    ee_type: image_collection
    cadence: { interval: 1, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1983-01-01"
      end_date: null
      bbox: [-180, -60, 180, 70]
    default_reducer: mean
    license: public-domain
    bands:
      minimum_temperature:
        description: Daily minimum 2 m air temperature
        units: deg_C
      maximum_temperature:
        description: Daily maximum 2 m air temperature
        units: deg_C
      saturation_vapor_pressure:
        description: Saturation vapor pressure
        units: kPa
      vapor_pressure_deficit:
        description: Vapor pressure deficit
        units: kPa
      relative_humidity:
        description: Relative humidity
        units: "%"
      heat_index:
        description: Heat index (apparent temperature)
        units: deg_F

