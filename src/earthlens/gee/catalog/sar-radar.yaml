# Auto-grouped slice of the GEE catalog: sar-radar.
# 13 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  COPERNICUS/S1_GRD:
    title: "Sentinel-1 SAR GRD: C-band Synthetic Aperture Radar Ground Range Detected"
    provider: copernicus
    ee_type: image_collection
    cadence: { interval: 6, unit: day }
    spatial_resolution: 10
    extent:
      start_date: "2014-10-03"
      end_date: null
    # Backscatter is in dB; averaging dB is not averaging power — median is safer.
    default_reducer: median
    license: proprietary
    terms_note: 'Copernicus Sentinel Data Terms and Conditions.'
    bands:
      VV:
        description: Single co-polarization, vertical transmit / vertical receive
        units: dB
        min: -50
        max: 1
        estimated_range: true
      VH:
        description: Dual-band cross-polarization, vertical transmit / horizontal receive
        units: dB
        min: -50
        max: 1
        estimated_range: true
      HH:
        description: Single co-polarization, horizontal transmit / horizontal receive
        units: dB
        min: -50
        max: 1
        estimated_range: true
      HV:
        description: Dual-band cross-polarization, horizontal transmit / vertical receive
        units: dB
        min: -50
        max: 1
        estimated_range: true
      angle:
        description: Approximate incidence angle from ellipsoid
        units: deg

