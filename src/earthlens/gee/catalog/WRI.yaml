# Auto-grouped slice of the GEE catalog: WRI.
# 12 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  WRI/Aqueduct_Flood_Hazard_Maps/V2:
