# Auto-grouped slice of the GEE catalog: Oxford.
# 10 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  Oxford/MAP/EVI_5km_Monthly:
    title: "Oxford MAP EVI 5km Monthly: Gap-Filled Enhanced Vegetation Index (2001-)"
    provider: Oxford Malaria Atlas Project
    ee_type: image_collection
    cadence: { interval: 1, unit: month }
    spatial_resolution: 5000
    extent:
      start_date: "2001-02-01"
      end_date: null
    default_reducer: mean
    license: CC-BY-NC-SA-4.0
    bands:
      Mean:
        description: Monthly mean Enhanced Vegetation Index
        min: 0
        max: 1
      FilledProportion:
        description: Percentage of the pixel that was gap-filled
        units: "%"
        min: 0
        max: 100

