# Auto-grouped slice of the GEE catalog: GLOBAL_FLOOD_DB.
# 1 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  GLOBAL_FLOOD_DB/MODIS_EVENTS/V1:
    title: Global Flood Database v1 (2000-2018)
    provider: Cloud to Street (C2S) / Dartmouth Flood Observatory (DFO)
    ee_type: image_collection
    spatial_resolution: 30
    extent:
      start_date: "2000-02-17"
      end_date: null
    default_reducer: mosaic
    license: CC-BY-NC-4.0
    terms_note: 'This work is licensed under the Creative Commons Attribution Non Commercial 4.0'
    user_uploaded: true
    bands:
      flooded:
        description: Maximum extent of flood water during an event.
        min: 0
        max: 1
      duration:
        description: Duration of surface water during an event in days. Pixel values indicate
        units: d
        min: 0
        max: 65535
      clear_views:
        description: Number of cloud-free observations in days between the start and end day
        units: d
        min: 0
        max: 65535
      clear_perc:
        description: Percentage of clear view observations during a given flood event. This is
        units: '%'
        min: 0
        max: 100
      jrc_perm_water:
        description: Permanent water determined by the JRC Global Surface Water dataset using the
        min: 0
        max: 1

