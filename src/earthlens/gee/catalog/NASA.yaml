        scale: 0.01
      ndvi:
        description: Mean NDVI
        scale: 0.01
      elevation:
        description: ASTER GDEM elevation (V002)
        units: m
      land_water_map:
        description: Land / water mask
      num_obs:
        description: Number of observations contributing per pixel

