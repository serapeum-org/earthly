datasets:
  NASA/ASTER_GED/AG100_003:
    title: "ASTER Global Emissivity Database AG100 v003 (100m, 2000-2008 baseline)"
    provider: NASA LP DAAC
    ee_type: image
    spatial_resolution: 100
    extent:
      start_date: "2000-01-01"
      end_date: "2008-12-31"
      bbox: [-180, -59, 180, 80]
    default_reducer: mosaic
    license: public-domain
    bands:
      emissivity_band10:
        description: ASTER band 10 mean emissivity
        scale: 0.001
      emissivity_band11:
        description: ASTER band 11 mean emissivity
        scale: 0.001
