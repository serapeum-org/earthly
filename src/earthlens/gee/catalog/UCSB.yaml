# Auto-grouped slice of the GEE catalog: UCSB.
# 1 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  UCSB/CHC/CMIP6/v1:
    title: The Climate Hazards Center (CHC) Coupled Model Intercomparison Project Phase 6 (CHC-CMIP6)
    provider: UCSB
    ee_type: image_collection
    cadence: { interval: 1, unit: day }
    spatial_resolution: 5566
    extent:
      start_date: "1983-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: median
    license: CC-BY-4.0
    terms_note: 'The dataset is under a Creative Commons Attribution 4.0 International'
    bands:
      CHIRPS:
        description: Daily total precipitation.
        units: mm/d
        min: 0
        max: 751.05
      himax:
        description: Daily maximum Heat Index.
        units: 'deg_C'
        min: -49.76
        max: 78.56
      RH:
        description: Relative Humidity.
        units: '%'
        min: -1.33
        max: 100
      RHx:
        description: Relative humidity at the hour of maximum temperature
        units: '%'
        min: -3.11
        max: 100
      RHn:
        description: Relative humidity at the hour of minimum temperature.
        units: '%'
        min: -2.603
        max: 100
      wbgtmax:
        description: Daily maximum wet bulb globe temperature.
        units: 'deg_C'
        min: -100.54
        max: 33.76
      vpd:
        description: Daily vapor pressure deficit.
        units: kPa
        min: 0
        max: 67.98
      svp:
        description: Daily average saturation vapor pressure.
        units: kPa
        min: 0.011
        max: 71.41
      Tmax:
        description: Daily maximum near-surface air temperature.
        units: 'deg_C'
        min: -43.04
        max: 90.52
      Tmin:
        description: Daily minimum near-surface air temperature.
        units: 'deg_C'
        min: -46.72
        max: 89.82

