# Auto-grouped slice of the GEE catalog: USDA.
# 4 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  USDA/NAIP/DOQQ:
    title: "USDA NAIP DOQQ: National Agriculture Imagery Program (US, 0.6-1m, 4-band)"
    provider: USDA FSA
    ee_type: image_collection
    cadence: { interval: 2, unit: year }
    spatial_resolution: 0.6
    extent:
      start_date: "2002-06-15"
      end_date: null
      bbox: [-124.84, 24.42, -64.82, 49.72]
    default_reducer: median
    license: public-domain
    bands:
      R:
        description: Red (digital number)
      G:
        description: Green (digital number)
      B:
        description: Blue (digital number)
      "N":
        description: Near infrared (digital number)

  USDA/NASS/CDL:
    title: USDA NASS Cropland Data Layer (annual US 30m crop classification)
    provider: USDA National Agricultural Statistics Service
    ee_type: image_collection
    cadence: { interval: 1, unit: year }
    spatial_resolution: 30
    extent:
      start_date: "1997-01-01"
      end_date: null
      bbox: [-127, 24, -65, 51]
    default_reducer: mosaic
    license: public-domain
    bands:
      cropland:
        description: Crop-specific land-cover classification
        min: 1
        max: 254
      cultivated:
        description: Cultivated vs non-cultivated land cover
        min: 1
        max: 2
      confidence:
        description: Per-pixel classification confidence
        units: "%"
        min: 0
        max: 100

