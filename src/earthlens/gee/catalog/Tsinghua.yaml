# Auto-grouped slice of the GEE catalog: Tsinghua.
# 2 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  Tsinghua/DESS/ChinaTerraceMap/v1:
    title: DESS China Terrace Map v1
    provider: Department of Earth System Science, Tsinghua University (DESS, THU)
    ee_type: image
    spatial_resolution: 30
    extent:
      start_date: "2018-01-01"
      end_date: null
      bbox: [70, 0, 140, 60]
    default_reducer: median
    license: CC-BY-4.0
    user_uploaded: true
    bands:
      terrace:
        description: 1 when a terrace is present, 0 when it is not.

  Tsinghua/FROM-GLC/GAIA/v10:
    title: "FROM-GLC GAIA v10: Year of Transition to Impervious Surface (30m, 1985-2018)"
    provider: Tsinghua University
    ee_type: image
    spatial_resolution: 30
    extent:
      start_date: "1985-01-01"
      end_date: "2018-12-31"
    default_reducer: mosaic
    license: CC-BY-4.0
    bands:
      change_year_index:
        description: Year of transition from pervious to impervious (1=1985 ... 34=2018)
        min: 1
        max: 34

