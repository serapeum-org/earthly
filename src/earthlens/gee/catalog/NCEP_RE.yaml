# Auto-grouped slice of the GEE catalog: NCEP_RE.
# 3 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  NCEP_RE/sea_level_pressure:
    title: "NCEP/NCAR Reanalysis 1: Sea-Level Pressure (6-hourly 2.5°)"
    provider: NOAA / NCEP / NCAR
    ee_type: image_collection
    cadence: { interval: 6, unit: hour }
    spatial_resolution: 278300
    extent:
      start_date: "1948-01-01"
      end_date: null
    default_reducer: mean
    license: public-domain
    bands:
      slp:
        description: Sea-level pressure
        units: Pa
        scale: 0.01

  NCEP_RE/surface_temp:
