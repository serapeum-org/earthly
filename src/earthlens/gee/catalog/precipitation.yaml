  UCSB-CHC/CHIRPS/V3/PENTAD:
    title: "CHIRPS v3 Pentad Precipitation (UCSB CHC, 1981-present)"
    provider: ucsb-chc
    ee_type: image_collection
    # Pentad = nominal 5-day window; recorded as `interval: 5, unit: day`
    # because the Cadence model has no `pentad` unit.
    cadence: { interval: 1, unit: pentad }
    spatial_resolution: 5566
    extent:
