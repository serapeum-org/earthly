    provider: csic
    ee_type: image_collection
    cadence: { interval: 1, unit: month }
    spatial_resolution: 55660
    extent:
      start_date: "1901-01-01"
      end_date: null
    default_reducer: mean
    license: CC-BY-4.0
    source: republished
    bands:
      SPEI_01_month:
        description: SPEI accumulated over 1 month
        min: -2.33
        max: 2.33
      SPEI_03_month:
