  UCSB-CHG/CHIRPS/PENTAD:
    title: "CHIRPS Pentad: 5-day rainfall (UCSB Climate Hazards Center)"
    provider: ucsb-chc
    ee_type: image_collection
    # Pentads are nominal 5-day windows (the last pentad of a month can be 3-6 days);
    # 5/day is the most accurate cadence the catalog can express.
    cadence: { interval: 1, unit: pentad }
    spatial_resolution: 5566
    extent:
      start_date: "1981-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
