# Auto-grouped slice of the GEE catalog: TRMM.
# 2 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  TRMM/3B42:
    title: 'TRMM 3B42: 3-Hourly Precipitation Estimates'
    provider: NASA GES DISC at NASA Goddard Space Flight Center
    ee_type: image_collection
    cadence: { interval: 3, unit: hour }
    spatial_resolution: 27830
    extent:
      start_date: "1998-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: median
    license: public-domain
    terms_note: 'This dataset is in the public domain and is available'
    bands:
      precipitation:
        description: Merged microwave/IR precipitation estimate
        units: mm/hr
        min: 0
        max: 100
      relativeError:
        description: Merged microwave/IR precipitation random error estimate
        units: mm/hr
        min: 0
        max: 100
      satPrecipitationSource:
        description: Flag to show source of data
      HQprecipitation:
        description: Pre-gauge-adjusted microwave precipitation estimate
        units: mm/hr
        min: 0
        max: 100
      IRprecipitation:
        description: Pre-gauge-adjusted infrared precipitation estimate
        units: mm/hr
        min: 0
        max: 100
      satObservationTime:
        description: Satellite observation time minus the time of the granule.
        units: min
        min: -90
        max: 90

  TRMM/3B43V7:
    title: 'TRMM 3B43: Monthly Precipitation Estimates'
    provider: NASA GES DISC at NASA Goddard Space Flight Center
    ee_type: image_collection
    cadence: { interval: 1, unit: month }
    spatial_resolution: 27830
    extent:
      start_date: "1998-01-01"
      end_date: null
      bbox: [-180, -50, 180, 50]
    default_reducer: median
    license: public-domain
    terms_note: 'This dataset is in the public domain and is available'
    bands:
      precipitation:
        description: Merged microwave/IR precipitation estimate
        units: mm/hr
        min: 0
        max: 6.73
      relativeError:
        description: Merged microwave/IR precipitation random error estimate
        units: mm/hr
        min: 0.001
        max: 16.36
      gaugeRelativeWeighting:
        description: Relative weighting of the rain gauges used in calibration
        units: '%'
        min: 0
        max: 100

