# CHC catalog slice: CHIRPS-2.0 (global / regional / preliminary).
# 27 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  global-daily:
    ftp_bases:
      tif: pub/org/chc/products/CHIRPS-2.0/global_daily/tifs/p05/
    region: global
    temporal_resolution: daily
    pandas_freq: D
    # CHC also publishes a 0.25-degree variant under tifs/p25/, but the
    # catalog's `ftp_bases` is format-keyed (not (format, resolution)-keyed),
    # so only the 0.05-degree path is addressable today. Listing [0.05]
    # matches what this row can actually deliver. If a p25 ftp_bases entry
    # or sibling dataset gets added, restore [0.05, 0.25] here.
    spatial_resolution: [0.05]
    formats: [tif]
    start_date: '1981-01-01'
    file_patterns:
      tif: "{year}/chirps-v2.0.{year}.{month}.{day}.tif.gz"
    variables:
      precipitation:
        description: Daily rainfall estimate
        units: mm/day
        types: flux
    lat_boundaries: [-50, 50]
    lon_boundaries: [-180, 180]
  global-monthly:
    ftp_bases:
