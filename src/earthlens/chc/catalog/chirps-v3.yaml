# CHC catalog slice: CHIRPS v3.0 (final + preliminary).
# 11 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  chirps-v3-global-daily-rnl:
    ftp_bases:
      tif: pub/org/chc/products/CHIRPS/v3.0/daily/final/rnl/
    region: global
    temporal_resolution: daily
    pandas_freq: D
    spatial_resolution: [0.05]
    formats: [tif]
    start_date: '1981-01-01'
    file_patterns:
      tif: "{year}/chirps-v3.0.rnl.{year}.{month}.{day}.tif"
    variables:
      precipitation:
        description: Daily rainfall estimate
        units: mm/day
        types: flux
    lat_boundaries: [-50, 50]
    lon_boundaries: [-180, 180]
  chirps-v3-global-daily-sat:
