# CHC catalog slice: CHIRPS-GEFS v3 + v12 (ensemble precipitation forecasts).
# 12 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  chirps-gefs-v3-daily:
    ftp_bases:
      tif: pub/org/chc/products/CHIRPS-GEFS/v3/daily/global/
    region: global
    temporal_resolution: daily
    pandas_freq: D
    spatial_resolution: [0.05]
    formats: [tif]
    start_date: '2001-01-01'
    file_patterns:
      tif: "{year}/chirps-gefs.{year}.{month}.{day}.tif"
    variables:
      precipitation:
        description: Daily rainfall estimate
        units: mm/day
        types: flux
    lat_boundaries: [-50, 50]
    lon_boundaries: [-180, 180]
  chirps-gefs-v3-dekad-lead0:
    ftp_bases:
      tif: pub/org/chc/products/CHIRPS-GEFS/v3/dekad_lead_0/global/
