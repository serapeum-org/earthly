# CHC catalog slice: CHIRPS-GEFS v12 (ensemble precipitation forecasts).
# 9 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.
#
# CHIRPS-GEFS v3 rows are NOT shipped today. Three rows
# (`chirps-gefs-v3-daily`, `chirps-gefs-v3-dekad-lead0`,
# `chirps-gefs-v3-pentad-lead0`) previously lived here with
# file_patterns marked "Provisional". A 2026-05-15 probe via
# `tools/chc/probe_chirps_gefs.py` found that:
#   * the v3-daily dir is partitioned as `year/month/`, not `year/`;
#   * the v3-dekad-lead0 and v3-pentad-lead0 dirs each split into
#     `anom/`, `data/`, and `zscore/` subdirs.
# Neither shape matches the placeholders the backend wires up today
# (`{year}` / `{month}` / `{day}` / `{dekad}` / `{pentad}` / `{hour}`
# / `{doy}` only -- see `backend.py:_placeholders`). Rather than
# shipping rows whose download path is known-broken, the v3 entries
# are withheld until both the YAML patterns are verified live and
# the backend grows the placeholder vocabulary to address the
# subdir split. Re-run the probe to confirm the layout and resurrect
# the rows in `_index.yaml`'s `available_datasets:` once verified.

datasets:

  chirps-gefs-v12-daily-16day:
    ftp_bases:
      tif: pub/org/chc/products/CHIRPS-GEFS_precip_v12/daily_16day/
    region: global
    temporal_resolution: daily
    pandas_freq: D
    spatial_resolution: [0.05]
    formats: [tif]
    start_date: '2000-01-01'
    file_patterns:
      tif: data.{year}.{doy}.tif
    variables:
      precipitation:
        description: 16-day daily CHIRPS-GEFS accumulated precipitation (v12)
        units: mm
        types: flux
  chirps-gefs-v12-05day:
    ftp_bases:
