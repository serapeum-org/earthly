# CHC catalog slice: SPI / SPEI (drought indices).
# 15 dataset(s). Edit in place; the loader merges every
# *.yaml file in this directory into one Catalog at import time.

datasets:
  spi-chirps3-01-pentad:
    ftp_bases:
      tif: pub/org/chc/products/SPI/CHIRPS3/01_pentad/
    region: global
    temporal_resolution: pentadal
    pandas_freq: 5D
    spatial_resolution: [0.05]
    formats: [tif]
    start_date: '1981-01-01'
    file_patterns:
      tif: SPI_01PentAccum_{year}_p{pentad}.tif
    variables:
      spi:
        description: Standardized Precipitation Index (SPI) based on CHIRPS3
        units: dimensionless
        types: index
