# Informational index for the CHC catalog.
#
#   available_datasets:    Every CHC dataset key in walk order. The
#                          curated subset lives in the per-family *.yaml
#                          files in this directory; edit those, not this
#                          list (tools/chc/refresh_chc_catalog.py rewrites
#                          it from the FTP walk).
#   regions:               Geographic-coverage profiles keyed by region
#                          name. Datasets carry inline lat/lon_boundaries;
#                          this block remains for `Catalog.describe_region`
#                          and `list_datasets(region=...)`.

