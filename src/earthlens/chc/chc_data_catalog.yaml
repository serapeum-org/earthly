# CHIRPS data catalog for the CHIRPS FTP backend.
#
# Schema:
#
#   available_datasets:               Informational. List of every
#                                     CHIRPS dataset directory available
#                                     on the FTP server. Read by humans,
#                                     ignored by the runtime.
#
#   datasets.<dataset_key>:           One entry per CHIRPS dataset
#                                     that earthlens can download.
#     ftp_base:                       FTP directory path relative to
#                                     the server root. May contain
#                                     `{year}` for year-partitioned
#                                     directories.
#     region:                         Geographic coverage of the
#                                     dataset ("global", "africa",
#                                     "central-america-caribbean",
#                                     "east-africa", "indonesia",
#                                     "western-hemisphere").
#     temporal_resolution:            Human-readable temporal
#                                     resolution label.
#     pandas_freq:                    Pandas offset alias used to
#                                     generate the date range (e.g.
#                                     "D", "MS", "5D", "10D", "YS").
#     spatial_resolution:             Pixel size in degrees (list
#                                     when multiple resolutions are
#                                     available under the same
#                                     dataset).
#     formats:                        List of file formats available
#                                     (tif, cog, netcdf, bil, png).
#     lat_boundaries:                 [south, north] latitude limits.
#     lon_boundaries:                 [west, east] longitude limits.
#     start_date:                     Earliest available date
#                                     (YYYY-MM-DD).
#     file_pattern:                   Python format-string for the
#                                     remote filename. Placeholders:
#                                     {year}, {month}, {day}, {dekad},
#                                     {pentad}, {res}.
#     variables.<short_code>:         One entry per variable. CHIRPS
#                                     only provides precipitation but
#                                     the structure mirrors the CDS
#                                     catalog for consistency.
#       description:                  Human-readable description.
#       units:                        Unit string.
#       types:                        "flux" — precipitation is an
#                                     accumulated quantity.
#
# Server:  ftp://data.chc.ucsb.edu  (anonymous FTP, no credentials)
# Base:    pub/org/chc/products/CHIRPS-2.0/
#
# Catalog refreshed from the live FTP listing on 2026-05-12.
#
# See: https://www.chc.ucsb.edu/data/chirps

version: 2

# Geographic-coverage profiles.  Each dataset's ``region:`` field is one
# of these keys; the catalog loader expands it into ``lat_boundaries`` and
# ``lon_boundaries`` at runtime, so those fields need not be repeated in
# every dataset entry.
#
#   global           — standard CHIRPS / CHIRP global coverage (±50° lat)
#   global-land      — CHIRTSdaily / CHIRTSmonthly (60°S – 70°N)
#   global-extended  — CHPclim v2 / WBGT (full globe ±90° lat)
#   africa, central-america-caribbean, east-africa,
#   indonesia, western-hemisphere — regional sub-extents

regions:
  global:
    lat_boundaries: [-50, 50]
    lon_boundaries: [-180, 180]

  global-land:
    lat_boundaries: [-60, 70]
    lon_boundaries: [-180, 180]

  global-extended:
    lat_boundaries: [-90, 90]
    lon_boundaries: [-180, 180]

  africa:
    lat_boundaries: [-40, 40]
    lon_boundaries: [-20, 55]

  central-america-caribbean:
    lat_boundaries: [5, 35]
    lon_boundaries: [-120, -55]

  east-africa:
    lat_boundaries: [-12, 6]
    lon_boundaries: [28, 42]

  indonesia:
    lat_boundaries: [-11, 6]
    lon_boundaries: [95, 141]

  western-hemisphere:
    lat_boundaries: [-50, 50]
    lon_boundaries: [-180, 0]

# Canonical variable-metadata definitions.  Each entry carries a YAML
# anchor so dataset ``variables:`` blocks can reference the metadata via
# a YAML alias instead of repeating it inline.  The description field
# omits the geographic region because ``region:`` and the dataset key
# already capture that; ``preliminary:`` covers near-real-time status.
#
# Usage in a dataset block:
#
#     variables:
#       precipitation: *precip_daily

variable_templates:

  _precip_daily: &precip_daily
    description: "Daily rainfall estimate"
    units: "mm/day"
    types: flux

  _precip_monthly: &precip_monthly
    description: "Monthly accumulated rainfall estimate"
    units: "mm/month"
    types: flux

  _precip_annual: &precip_annual
    description: "Annual accumulated rainfall estimate"
    units: "mm/year"
    types: flux

  _precip_dekadal: &precip_dekadal
    description: "Dekadal (10-day) accumulated rainfall estimate"
    units: "mm/dekad"
    types: flux

  _precip_pentadal: &precip_pentadal
    description: "Pentadal (5-day) accumulated rainfall estimate"
    units: "mm/pentad"
    types: flux

  _precip_2monthly: &precip_2monthly
    description: "2-month accumulated rainfall estimate"
    units: "mm/2-months"
    types: flux

  _precip_3monthly: &precip_3monthly
    description: "3-month (seasonal) accumulated rainfall estimate"
    units: "mm/3-months"
    types: flux

  _precip_6hourly: &precip_6hourly
    description: "6-hourly rainfall estimate"
    units: "mm/6h"
    types: flux

  _spi: &spi
    description: "Standardized Precipitation Index (SPI) based on CHIRPS3"
    units: "dimensionless"
    types: index

  _spei: &spei
    description: "Standardized Precipitation-Evapotranspiration Index (SPEI) based on CHIRPS3 + MERRA2 PET"
    units: "dimensionless"
    types: index

  _wbgt: &wbgt
    description: "Wet Bulb Globe Temperature (WBGT)"
    units: "degC"
    types: state

  _tmax: &tmax
    description: "Daily maximum 2-metre air temperature"
    units: "degC"
    types: state

  _tmin: &tmin
    description: "Daily minimum 2-metre air temperature"
    units: "degC"
    types: state

  _heat_index: &heat_index
    description: "Daily heat index (apparent temperature)"
    units: "degC"
    types: state

  _relative_humidity: &relative_humidity
    description: "Daily relative humidity"
    units: "%"
    types: state

  _svp: &svp
    description: "Daily saturation vapour pressure"
    units: "kPa"
    types: state

  _vpd: &vpd
    description: "Daily vapour pressure deficit"
    units: "kPa"
    types: state

# Available-format profiles.  The FTP server organises each dataset's
# files in per-format subdirectories; ``formats:`` lists every format
# published there.  Profiles are defined once here with YAML anchors so
# dataset entries reference them with a single alias instead of repeating
# the list inline.
#
# Usage in a dataset entry:
#
#     formats: *fmt_tif_cog_nc

format_profiles:
  # GeoTIFF only (primary format for most datasets)
  _fmt_tif: &fmt_tif [tif]
  # GeoTIFF + NetCDF
  _fmt_tif_nc: &fmt_tif_nc [tif, netcdf]
  # GeoTIFF + ESRI BIL
  _fmt_tif_bil: &fmt_tif_bil [tif, bil]
  # GeoTIFF + ESRI BIL + PNG thumbnail
  _fmt_tif_bil_png: &fmt_tif_bil_png [tif, bil, png]
  # GeoTIFF + Cloud-Optimised GeoTIFF + NetCDF
  _fmt_tif_cog_nc: &fmt_tif_cog_nc [tif, cog, netcdf]
  # GeoTIFF + COG + NetCDF + ESRI BIL
  _fmt_tif_cog_nc_bil: &fmt_tif_cog_nc_bil [tif, cog, netcdf, bil]
  # GeoTIFF + NetCDF + ESRI BIL
  _fmt_tif_nc_bil: &fmt_tif_nc_bil [tif, netcdf, bil]
  # GeoTIFF + NetCDF + ESRI BIL + COG
  _fmt_tif_nc_bil_cog: &fmt_tif_nc_bil_cog [tif, netcdf, bil, cog]
  # NetCDF only (SPEI datasets)
  _fmt_nc: &fmt_nc [netcdf]
  # ESRI BIL only (Indonesia datasets)
  _fmt_bil: &fmt_bil [bil]
  # Raw binary only (Africa 6-hourly)
  _fmt_bin: &fmt_bin [bin]

  # FTP subdirectory name used by each format on the CHC server.
  # Backends substitute this when constructing alternative-format paths.
  _fmt_ftp_dirs: &fmt_ftp_dirs
    tif:    tifs
    cog:    cogs
    netcdf: netcdf
    bil:    bils
    bin:    p1_bin    # Africa 6-hourly specific

  # Compressed-file extensions per format (for local filename construction).
  _fmt_extensions: &fmt_extensions
    tif:    ".tif.gz"   # CHIRPS-2.0; CHIRPS v3 uses bare .tif (no gz)
    cog:    ".cog"
    netcdf: ".nc"
    bil:    ".bil.gz"
    bin:    ".bin"
