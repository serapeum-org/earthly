site_name: earthlens
site_description: Remote sensing package
site_url: https://serapeum-org.github.io/earthlens/
repo_url: https://github.com/serapeum-org/earthlens
repo_name: serapeum-org/earthlens

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips
    - search.highlight
    - search.suggest
    - toc.follow
    - announce.dismiss
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Switch to system preference
  primary: indigo
  accent: indigo
  icon:
    repo: fontawesome/brands/github


plugins:
  - search
  - mkdocs-jupyter:
      include: ["*.ipynb"]
  - panzoom:
      hint_location: "top"
      key: "ctrl"
      full_screen: true
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
  - table-reader
  - tags
  - mike:
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
      canonical_version: null
      version_selector: true
      css_dir: css
      javascript_dir: js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: "#"
      toc_depth: 1-4
      anchorlink: true

nav:
  - Home: index.md
  - Guide:
    - Installation: installation.md
    - Architecture: overview/architecture.md
  - Data Sources:
    - CHC (CHIRPS / CHIRTS / SPI / SPEI / …):
      - Introduction: reference/chc/introduction.md
      - Usage: reference/chc/usage.md
      - Catalog & Tooling: reference/chc/catalog.md
      - Reference: reference/chc/chc.md
    - Amazon S3: reference/s3.md
    - ECMWF:
      - Reference: reference/ecmwf.md
      - Catalog & Probes: reference/ecmwf/catalog.md
      - Aggregation: reference/aggregation.md
    - GEE:
      - Introduction: reference/gee/introduction.md
      - Registering a project: reference/gee/registering-a-project.md
      - Service account setup: reference/gee/service-account-setup.md
      - Usage: reference/gee/usage.md
      - Reference: reference/gee/gee.md
  - Examples:
    - Authentication: examples/authentication.md
    - Data Sources: examples/data-sources.md
    - Data Catalog: examples/catalog.md
    - CDS / ECMWF:
      - Quickstart: examples/cds/cds_quickstart.ipynb
      - Hydrology — water balance: examples/cds/hydrology_water_balance.ipynb
      - Oceanography — SST & sea ice: examples/cds/oceanography_sst_sea_ice.ipynb
      - Atmosphere — pressure levels: examples/cds/atmosphere_pressure_levels.ipynb
      - Agriculture — crop water demand: examples/cds/agriculture_crop_water.ipynb
      - Solar — PV resource assessment: examples/cds/solar_resource_assessment.ipynb
      - Wind — hub-height resource: examples/cds/wind_energy_resource.ipynb
      - Snow & cryosphere — winter snowpack: examples/cds/snow_cryosphere_winter.ipynb
      - Heat waves — public health: examples/cds/heat_waves_public_health.ipynb
      - Climate change — temperature anomalies: examples/cds/climate_change_anomalies.ipynb
      - Drought — SPI from precipitation: examples/cds/drought_precipitation_deficit.ipynb
    - Google Earth Engine:
      - Atmosphere & chemistry — TROPOMI NO2: examples/gee/atmosphere-chemistry.ipynb
      - Climate reanalysis — ERA5-Land monthly: examples/gee/climate-reanalysis.ipynb
      - Community — Planet NICFI: examples/gee/community.ipynb
      - Elevation & terrain — SRTM 30 m: examples/gee/elevation-terrain.ipynb
      - Hydrology & water — JRC Global Surface Water: examples/gee/hydrology-water.ipynb
      - Land cover & change — ESA WorldCover: examples/gee/land-cover-change.ipynb
      - Optical / multispectral — Sentinel-2 SR: examples/gee/optical-multispectral.ipynb
      - Other — CIESIN GPWv4 population: examples/gee/other.ipynb
      - Precipitation — CHIRPS daily: examples/gee/precipitation.ipynb
      - SAR / radar — Sentinel-1 GRD VV: examples/gee/sar-radar.ipynb
      - Tracking batch exports (end-to-end demo): examples/gee/track-batch-exports.ipynb
  - API Reference:
    - EarthLens Facade: reference/earthlens.md
    - AbstractDataSource: reference/abstract-datasource.md
  - About:
    - Change Log: change-log.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/serapeum-org/earthlens
  version:
      provider: mike
  version_selector: true
